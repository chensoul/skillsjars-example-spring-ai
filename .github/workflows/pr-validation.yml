name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Validate PR title follows conventions
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            build
            ci
            perf
            revert

      - name: Check for CHANGELOG update
        if: contains(github.event.pull_request.labels.*.name, 'release')
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -q CHANGELOG.md; then
            echo "::warning::CHANGELOG.md should be updated for release PRs"
          fi

  verify-compilation:
    name: Verify Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile project
        run: ./mvnw clean compile -B

      - name: Verify project structure
        run: ./mvnw verify -B -DskipTests

  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check for dependency updates
        run: ./mvnw versions:display-dependency-updates -B || true

      - name: Check for plugin updates
        run: ./mvnw versions:display-plugin-updates -B || true

      - name: Display dependency tree
        run: ./mvnw dependency:tree -B
